    <title>bKashify Salami</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    />

    <link rel="stylesheet" href="style.css" />

    <!-- jsQR -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <!-- Alertify -->
    <script src="//cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/alertify.min.js"></script>
    <link

  <body>
    <div class="site-wrapper">
      <main class="main-container">
        <div class="column-left">
          <section class="hero-section">
            <h1 class="hero-title">
              <span class="highlight light">b</span><span class="light">Kashify</span><br /><span class="light">Salami</span>
            </h1>
            <!-- <p class="hero-subtitle">
              Stop hinting. Start asking. <br />
              Generate your bespoke story card.
            </p> -->
          </section>

          <div class="card-brutalist generator-panel">
            <div class="form-row">
              <label class="block-label">00 // SELECT TEMPLATE</label>
              <div class="template-selector" id="template-selector">
                <label class="template-card">
                  <input type="radio" name="template" value="eid_dark" checked />
                  <span class="template-card-inner">
                    <iconify-icon icon="solar:moon-bold" style="font-size:1.3rem"></iconify-icon>
                    <span>Dark</span>
                  </span>
                </label>
                <label class="template-card">
                  <input type="radio" name="template" value="eid_light" />
                  <span class="template-card-inner">
                    <iconify-icon icon="solar:sun-bold" style="font-size:1.3rem"></iconify-icon>
                    <span>Light</span>
                  </span>
                </label>
              </div>
            </div>

            <div class="form-row">
              <label class="block-label">01 // TARGET NUMBER</label>
              <div class="input-wrapper">
                <span class="prefix">
                  <img src="bkash.svg" alt="bKash" class="bkash-logo" />
                  <span class="prefix-wordmark">bKash</span>
                </span>
                <input
                  type="text"
                  id="number"
                  placeholder="01XXX XXX XXX"
                  maxlength="13"
                  oninput="
                    let val = this.value.replace(/[^0-9]/g, '');
                    let formatted = val;
                    if (val.length > 5) {
                        formatted = val.substring(0, 5) + ' ' + val.substring(5);
                    }
                    if (val.length > 8) {
                        formatted = formatted.substring(0, 9) + ' ' + val.substring(8);
                    }
                    this.value = formatted;
                  "
                />
              </div>
            </div>

            <div class="form-row">
              <label class="block-label">02 // UPLOAD FACE</label>
              <div
                class="upload-zone"
                id="upload-zone"
                onclick="document.getElementById('image').click()"
              >
                <input
                  type="file"
                  id="image"
                  accept="image/*"
                  onchange="handleFileSelect(event)"
                  style="display: none"
                />
                <div class="upload-content" id="image-label">
                  <iconify-icon
                    icon="solar:camera-add-bold"
                    class="upload-icon-svg"
                  ></iconify-icon>
                  <strong>CLICK TO UPLOAD</strong>
                  <span class="upload-hint"
                    >Your most intimidating look.</span
                  >
                </div>
              </div>
            </div>

            <div class="form-row">
              <label class="block-label">03 // UPLOAD QR <span class="label-optional">(OPTIONAL)</span></label>
              <div
                class="upload-zone upload-zone-sm"
                id="qr-upload-zone"
                onclick="document.getElementById('qr-input').click()"
              >
                <input
                  type="file"
                  id="qr-input"
                  accept="image/*"
                  onchange="handleQRSelect(event)"
                  style="display: none"
                />
                <div class="upload-content" id="qr-label">
                  <iconify-icon
                    icon="solar:qr-code-bold"
                    class="upload-icon-svg"
                  ></iconify-icon>
                  <strong>UPLOAD QR IMAGE</strong>
                  <span class="upload-hint">Auto-detects &amp; crops the QR.</span>
                </div>
              </div>
            </div>

            <button
              id="generate"
              class="btn-brutalist action-generate"
              onclick="generate()"
            >
              <iconify-icon
                icon="solar:magic-stick-3-bold"
                style="font-size: 1.4rem; margin-right: 10px"
              ></iconify-icon>
              GENERATE
            </button>
            <!-- <div class="disclaimer-text">Prepare for extortion.</div> -->
          </div>
        </div>

        <div class="column-right mobile-hidden">
          <div class="card-brutalist result-panel" id="story">
            <div class="result-header">
              <h2>YOUR WEAPON</h2>
              <span class="status-dot"></span>
            </div>
            <div class="result-image-wrapper">
              <div class="placeholder-text" id="placeholder-text">
                <iconify-icon
                  icon="solar:gallery-minimalistic-bold"
                  style="
                    font-size: 2.5rem;
                    display: block;
                    margin-bottom: 12px;
                    color: #ccc;
                  "
                ></iconify-icon>
                Click "Generate" to forge your weapon.
              </div>
              <img
                id="story-image"
                src="blank.png"
                alt="Generated Salami Card"
                style="opacity: 0"
              />
            </div>
            <div class="result-actions">
              <button id="save" class="btn-brutalist btn-secondary">
                <iconify-icon
                  icon="solar:download-minimalistic-bold"
                  style="font-size: 1.2rem; margin-right: 8px"
                ></iconify-icon>
                DOWNLOAD
              </button>
            </div>
          </div>
        </div>
      </main>

      <footer class="site-footer">
        <p class="footer-content">
          Made by <a target="_blank" rel="noopener noreferrer" class="footer-link" href="https://bokaif.github.io">@bokaif</a>
          <span class="footer-divider">&times;</span>
          <span id="easter-egg"
            >gib me salami?
            <iconify-icon
              icon="fluent-emoji-high-contrast:hand-with-index-finger-and-thumb-crossed"
              style="vertical-align: -2px;"
            ></iconify-icon>
          </span>
        </p>
      </footer>

    <!-- ===== CROP MODAL ===== -->
    <div class="crop-overlay" id="crop-overlay">
      <div class="crop-modal">
        <div class="crop-modal-header">
          <h3>
            <iconify-icon
              icon="solar:crop-bold"
              style="margin-right: 8px; vertical-align: -3px"
            ></iconify-icon>
            CROP YOUR FACE
          </h3>
          <p class="crop-modal-subtitle">
            Drag to reposition · Pinch or scroll to zoom
          </p>
        </div>

        <div class="crop-viewport-wrapper">
          <!-- The square crop viewport -->
          <div class="crop-viewport" id="crop-viewport">
            <canvas id="crop-canvas"></canvas>
            <!-- Visual crop square overlay -->
            <div class="crop-frame">
              <div class="crop-corner tl"></div>
              <div class="crop-corner tr"></div>
              <div class="crop-corner bl"></div>
              <div class="crop-corner br"></div>
              <!-- Rule-of-thirds grid -->
              <div class="crop-grid">
                <div class="grid-line h1"></div>
                <div class="grid-line h2"></div>
                <div class="grid-line v1"></div>
                <div class="grid-line v2"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="crop-controls">
          <div class="zoom-control">
            <iconify-icon
              icon="solar:minimize-square-3-bold"
              class="zoom-icon"
            ></iconify-icon>
            <input
              type="range"
              id="zoom-slider"
              min="1"
              max="4"
              step="0.01"
              value="1"
              class="zoom-slider"
            />
            <iconify-icon
              icon="solar:maximize-square-3-bold"
              class="zoom-icon"
            ></iconify-icon>
            <span class="zoom-value" id="zoom-value">1.0x</span>
          </div>
          <div class="rotate-controls">
            <button class="btn-rotate" id="rotate-left-btn" title="Rotate left">
              <iconify-icon icon="vaadin:rotate-left"></iconify-icon>
            </button>
            <button class="btn-rotate" id="rotate-right-btn" title="Rotate right">
              <iconify-icon icon="vaadin:rotate-right"></iconify-icon>
            </button>
          </div>
        </div>

        <div class="crop-actions">
          <button class="btn-brutalist btn-crop-cancel" id="crop-cancel-btn">
            CANCEL
          </button>
          <button
            class="btn-brutalist btn-crop-confirm action-generate"
            id="crop-confirm-btn"
          >
            <iconify-icon
              icon="solar:check-circle-bold"
              style="margin-right: 8px; font-size: 1.2rem"
            ></iconify-icon>
            CROP & USE
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      // ─── State ───────────────────────────────────────────────────────
      let image = null;
      let qrImage = null;
      let rawImageSrc = null;

      // ─── Cropper state ────────────────────────────────────────────────
      const cropState = {
        img: null,
        zoom: 1,
        panX: 0,
        panY: 0,
        rotation: 0,       // degrees: 0 | 90 | 180 | 270
        canvasSize: 400,
        isDragging: false,
        lastX: 0,
        lastY: 0,
      };

      // ─── Face file input handler ────────────────────────────────────────
      function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
          rawImageSrc = e.target.result;
          openCropper(rawImageSrc);
        };
        reader.readAsDataURL(file);
        event.target.value = "";
      }

      // ─── QR file input handler ──────────────────────────────────────────
      function handleQRSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
          detectAndCropQR(e.target.result)
            .then(function (croppedQR) {
              qrImage = croppedQR;
              const label = document.getElementById("qr-label");
              label.innerHTML = "";
              label.style.backgroundImage = "url(" + croppedQR + ")";
              label.style.backgroundSize = "contain";
              label.style.backgroundPosition = "center";
              label.style.backgroundRepeat = "no-repeat";

              var removeBtn = document.createElement("div");
              removeBtn.className = "upload-change-hint";
              removeBtn.title = "Remove QR";
              removeBtn.innerHTML =
                '<iconify-icon icon="solar:close-circle-bold"></iconify-icon>';
              removeBtn.onclick = function (ev) {
                ev.stopPropagation();
                clearQR();
              };
              label.appendChild(removeBtn);
              alertify.success("QR detected and cropped!");
            })
            .catch(function (err) {
              alertify.error(err);
            });
        };
        reader.readAsDataURL(file);
        event.target.value = "";
      }

      function clearQR() {
        qrImage = null;
        var label = document.getElementById("qr-label");
        label.style.backgroundImage = "";
        label.innerHTML =
          '<iconify-icon icon="solar:qr-code-bold" class="upload-icon-svg"></iconify-icon>' +
          "<strong>UPLOAD QR IMAGE</strong>" +
          '<span class="upload-hint">We\'ll auto-detect &amp; crop the QR.</span>';
      }

      // ─── Open cropper modal ────────────────────────────────────────────
      function openCropper(src) {
        const overlay = document.getElementById("crop-overlay");
        overlay.classList.add("active");
        document.body.style.overflow = "hidden";
        cropState.rotation = 0; // reset rotation for each new image
        const img = new Image();
        img.onload = function () {
          cropState.img = img;
          resetCropState();
          renderCrop();
        };
        img.src = src;
      }

      function closeCropper() {
        document.getElementById("crop-overlay").classList.remove("active");
        document.body.style.overflow = "";
      }

      function resetCropState() {
        const img = cropState.img;
        const cs = cropState.canvasSize;
        const rot = cropState.rotation;
        // When rotated 90/270 the image natural dims swap
        const isSwapped = rot === 90 || rot === 270;
        const srcW = isSwapped ? img.naturalHeight : img.naturalWidth;
        const srcH = isSwapped ? img.naturalWidth  : img.naturalHeight;
        const minDim = Math.min(srcW, srcH);
        const initialZoom = cs / minDim;
        cropState.zoom = initialZoom;
        cropState.panX = (cs - srcW * initialZoom) / 2;
        cropState.panY = (cs - srcH * initialZoom) / 2;
        document.getElementById("zoom-slider").min = initialZoom;
        document.getElementById("zoom-slider").max = initialZoom * 4;
        document.getElementById("zoom-slider").step = initialZoom * 0.01;
        document.getElementById("zoom-slider").value = initialZoom;
        updateZoomDisplay();
      }

      function updateZoomDisplay() {
        const base = parseFloat(document.getElementById("zoom-slider").min);
        const cur = cropState.zoom;
        document.getElementById("zoom-value").textContent =
          (cur / base).toFixed(1) + "x";
      }

      function renderCrop() {
        const cs = cropState.canvasSize;
        const canvas = document.getElementById("crop-canvas");
        const vp = document.getElementById("crop-viewport");
        const vpSize = vp.clientWidth || 340;
        canvas.style.width = vpSize + "px";
        canvas.style.height = vpSize + "px";
        canvas.width = cs;
        canvas.height = cs;
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, cs, cs);
        // checkerboard
        const sq = 20;
        for (let y = 0; y < cs; y += sq) {
          for (let x = 0; x < cs; x += sq) {
            ctx.fillStyle = (x / sq + y / sq) % 2 === 0 ? "#e8e8e8" : "#f8f8f8";
            ctx.fillRect(x, y, sq, sq);
          }
        }
        const img = cropState.img;
        const rot = cropState.rotation;
        const rad = (rot * Math.PI) / 180;
        // Determine rendered dims after rotation
        const isSwapped = rot === 90 || rot === 270;
        const drawnW = isSwapped
          ? img.naturalHeight * cropState.zoom
          : img.naturalWidth  * cropState.zoom;
        const drawnH = isSwapped
          ? img.naturalWidth  * cropState.zoom
          : img.naturalHeight * cropState.zoom;
        ctx.save();
        ctx.translate(cropState.panX + drawnW / 2, cropState.panY + drawnH / 2);
        ctx.rotate(rad);
        ctx.drawImage(
          img,
          -img.naturalWidth  * cropState.zoom / 2,
          -img.naturalHeight * cropState.zoom / 2,
          img.naturalWidth  * cropState.zoom,
          img.naturalHeight * cropState.zoom,
        );
        ctx.restore();
      }

      // ─── Zoom slider ──────────────────────────────────────────────────
      document
        .getElementById("zoom-slider")
        .addEventListener("input", function () {
          const newZoom = parseFloat(this.value);
          const cs = cropState.canvasSize;
          const centerX = cs / 2;
          const centerY = cs / 2;
          const factor = newZoom / cropState.zoom;
          cropState.panX = centerX - (centerX - cropState.panX) * factor;
          cropState.panY = centerY - (centerY - cropState.panY) * factor;
          cropState.zoom = newZoom;
          clampPan();
          updateZoomDisplay();
          renderCrop();
        });

      // ─── Rotate buttons ───────────────────────────────────────────────
      function rotateBy(deg) {
        cropState.rotation = ((cropState.rotation + deg) % 360 + 360) % 360;
        resetCropState();
        document.getElementById("zoom-slider").value = cropState.zoom;
        renderCrop();
      }

      document
        .getElementById("rotate-left-btn")
        .addEventListener("click", function () { rotateBy(-90); });

      document
        .getElementById("rotate-right-btn")
        .addEventListener("click", function () { rotateBy(90); });

      // ─── Pan: Mouse ────────────────────────────────────────────────────
      const cropCanvas = document.getElementById("crop-canvas");

      cropCanvas.addEventListener("mousedown", (e) => {
        cropState.isDragging = true;
        cropState.lastX = e.clientX;
        cropState.lastY = e.clientY;
        cropCanvas.style.cursor = "grabbing";
      });
      window.addEventListener("mousemove", (e) => {
        if (!cropState.isDragging) return;
        const vp = document.getElementById("crop-viewport");
        const rect = vp.getBoundingClientRect();
        const scale = cropState.canvasSize / rect.width;
        cropState.panX += (e.clientX - cropState.lastX) * scale;
        cropState.panY += (e.clientY - cropState.lastY) * scale;
        cropState.lastX = e.clientX;
        cropState.lastY = e.clientY;
        clampPan();
        renderCrop();
      });
      window.addEventListener("mouseup", () => {
        cropState.isDragging = false;
        cropCanvas.style.cursor = "grab";
      });

      // ─── Pan: Touch ────────────────────────────────────────────────────
      let lastTouchDistance = null;

      cropCanvas.addEventListener(
        "touchstart",
        (e) => {
          e.preventDefault();
          if (e.touches.length === 1) {
            cropState.isDragging = true;
            cropState.lastX = e.touches[0].clientX;
            cropState.lastY = e.touches[0].clientY;
          } else if (e.touches.length === 2) {
            lastTouchDistance = getTouchDist(e.touches);
          }
        },
        { passive: false },
      );

      cropCanvas.addEventListener(
        "touchmove",
        (e) => {
          e.preventDefault();
          const vp = document.getElementById("crop-viewport");
          const rect = vp.getBoundingClientRect();
          const scale = cropState.canvasSize / rect.width;
          if (e.touches.length === 1 && cropState.isDragging) {
            cropState.panX += (e.touches[0].clientX - cropState.lastX) * scale;
            cropState.panY += (e.touches[0].clientY - cropState.lastY) * scale;
            cropState.lastX = e.touches[0].clientX;
            cropState.lastY = e.touches[0].clientY;
            clampPan();
            renderCrop();
          } else if (e.touches.length === 2) {
            const dist = getTouchDist(e.touches);
            if (lastTouchDistance) {
              const factor = dist / lastTouchDistance;
              const cs = cropState.canvasSize;
              const cx =
                ((e.touches[0].clientX + e.touches[1].clientX) / 2 -
                  rect.left) *
                scale;
              const cy =
                ((e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top) *
                scale;
              const newZoom = Math.max(
                parseFloat(document.getElementById("zoom-slider").min),
                Math.min(
                  parseFloat(document.getElementById("zoom-slider").max),
                  cropState.zoom * factor,
                ),
              );
              const zoomFactor = newZoom / cropState.zoom;
              cropState.panX = cx - (cx - cropState.panX) * zoomFactor;
              cropState.panY = cy - (cy - cropState.panY) * zoomFactor;
              cropState.zoom = newZoom;
              document.getElementById("zoom-slider").value = newZoom;
              clampPan();
              updateZoomDisplay();
              renderCrop();
            }
            lastTouchDistance = dist;
          }
        },
        { passive: false },
      );

      cropCanvas.addEventListener("touchend", (e) => {
        if (e.touches.length < 2) lastTouchDistance = null;
        if (e.touches.length === 0) cropState.isDragging = false;
      });

      function getTouchDist(touches) {
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
      }

      // ─── Scroll to zoom ────────────────────────────────────────────────
      cropCanvas.addEventListener(
        "wheel",
        (e) => {
          e.preventDefault();
          const delta = e.deltaY < 0 ? 1.08 : 0.92;
          const slider = document.getElementById("zoom-slider");
          const vp = document.getElementById("crop-viewport");
          const rect = vp.getBoundingClientRect();
          const scale = cropState.canvasSize / rect.width;
          const cx = (e.clientX - rect.left) * scale;
          const cy = (e.clientY - rect.top) * scale;
          const newZoom = Math.max(
            parseFloat(slider.min),
            Math.min(parseFloat(slider.max), cropState.zoom * delta),
          );
          const factor = newZoom / cropState.zoom;
          cropState.panX = cx - (cx - cropState.panX) * factor;
          cropState.panY = cy - (cy - cropState.panY) * factor;
          cropState.zoom = newZoom;
          slider.value = newZoom;
          clampPan();
          updateZoomDisplay();
          renderCrop();
        },
        { passive: false },
      );

      function clampPan() {
        const img = cropState.img;
        const cs = cropState.canvasSize;
        const iw = img.naturalWidth * cropState.zoom;
        const ih = img.naturalHeight * cropState.zoom;
        if (iw >= cs) {
          cropState.panX = Math.min(0, Math.max(cs - iw, cropState.panX));
        } else {
          cropState.panX = Math.max(0, Math.min(cs - iw, cropState.panX));
        }
        if (ih >= cs) {
          cropState.panY = Math.min(0, Math.max(cs - ih, cropState.panY));
        } else {
          cropState.panY = Math.max(0, Math.min(cs - ih, cropState.panY));
        }
      }

      // ─── Confirm crop: export square ──────────────────────────────────
      document
        .getElementById("crop-confirm-btn")
        .addEventListener("click", function () {
          const cs = cropState.canvasSize;
          const canvas = document.getElementById("crop-canvas");
          canvas.width = cs;
          canvas.height = cs;
          renderCrop();
          const exportSize = Math.min(1200, cs * 2);
          const exportCanvas = document.createElement("canvas");
          exportCanvas.width = exportSize;
          exportCanvas.height = exportSize;
          const ectx = exportCanvas.getContext("2d");
          const scaleFactor = exportSize / cs;
          const rot = cropState.rotation;
          const rad = (rot * Math.PI) / 180;
          const isSwapped = rot === 90 || rot === 270;
          const drawnW = (isSwapped ? cropState.img.naturalHeight : cropState.img.naturalWidth)  * cropState.zoom * scaleFactor;
          const drawnH = (isSwapped ? cropState.img.naturalWidth  : cropState.img.naturalHeight) * cropState.zoom * scaleFactor;
          ectx.save();
          ectx.translate(cropState.panX * scaleFactor + drawnW / 2, cropState.panY * scaleFactor + drawnH / 2);
          ectx.rotate(rad);
          ectx.drawImage(
            cropState.img,
            -cropState.img.naturalWidth  * cropState.zoom * scaleFactor / 2,
            -cropState.img.naturalHeight * cropState.zoom * scaleFactor / 2,
            cropState.img.naturalWidth  * cropState.zoom * scaleFactor,
            cropState.img.naturalHeight * cropState.zoom * scaleFactor,
          );
          ectx.restore();
          image = exportCanvas.toDataURL("image/jpeg", 0.92);
          const label = document.getElementById("image-label");
          label.innerHTML = "";
          label.style.backgroundImage = "url(" + image + ")";
          label.style.backgroundSize = "cover";
          label.style.backgroundPosition = "center";
          const changeHint = document.createElement("div");
          changeHint.className = "upload-change-hint";
          changeHint.title = "Adjust Crop";
          changeHint.innerHTML =
            '<iconify-icon icon="solar:pen-bold"></iconify-icon>';
          changeHint.onclick = function (e) {
            e.stopPropagation();
            document.getElementById("crop-overlay").classList.add("active");
            document.body.style.overflow = "hidden";
          };
          label.appendChild(changeHint);
          closeCropper();
          alertify.success("Image cropped. Looking good!");
        });

      // ─── Cancel crop ──────────────────────────────────────────────────
      document
        .getElementById("crop-cancel-btn")
        .addEventListener("click", closeCropper);
      document
        .getElementById("crop-overlay")
        .addEventListener("click", function (e) {
          if (e.target === this) closeCropper();
        });

      // ─── Main generate (async) ──────────────────────────────────────────
      async function generate() {
        var number = document.getElementById("number").value.replace(/\s+/g, "");
        var templateId =
          document.querySelector('input[name="template"]:checked').value;

        if (number === "" && image == null) {
          alertify.error("Fill all fields to generate");
          return;
        }
        if (number === "") {
          alertify.error("Need target bKash number");
          return;
        }
        if (image == null) {
          alertify.error("Your face is mandatory for guilt");
          return;
        }

        var generateBtn = document.getElementById("generate");
        var originalHTML = generateBtn.innerHTML;
        generateBtn.innerHTML =
          '<iconify-icon icon="solar:loading-bold" style="animation:spin 1s linear infinite; font-size:1.4rem; margin-right:10px;"></iconify-icon>GENERATING...';
        generateBtn.style.pointerEvents = "none";

        try {
          var svg = await bkashify(templateId, number, image, qrImage);
          svgToPng(svg, function (imgData) {
            var storyImage = document.getElementById("story-image");
            var placeholder = document.getElementById("placeholder-text");
            storyImage.src = imgData;
            storyImage.style.opacity = "1";
            if (placeholder) placeholder.style.display = "none";
            alertify.success("Card Generated. Go extort!");
            if (window.innerWidth <= 900) {
              document
                .querySelector(".column-right")
                .classList.remove("mobile-hidden");
              setTimeout(function () {
                document
                  .getElementById("story")
                  .scrollIntoView({ behavior: "smooth", block: "start" });
              }, 10);
            }
            generateBtn.innerHTML = originalHTML;
            generateBtn.style.pointerEvents = "auto";
          });
        } catch (err) {
          alertify.error("Generation failed: " + err);
          generateBtn.innerHTML = originalHTML;
          generateBtn.style.pointerEvents = "auto";
        }
      }

      // ─── Download ──────────────────────────────────────────────────────
      document.getElementById("save").addEventListener("click", function () {
        var imgSrc = document.getElementById("story-image").src;
        if (imgSrc.includes("blank.png") || imgSrc === window.location.href) {
          alertify.error("Generate a card first, genius.");
          return;
        }
        var a = document.createElement("a");
        a.href = imgSrc;
        a.download = "bsalami-" + Date.now() + ".png";
        a.click();
      });

      // ─── Easter egg ────────────────────────────────────────────────────
      document
        .getElementById("easter-egg")
        .addEventListener("click", function () {
          alertify.message("(ﾉ◕ヮ◕)ﾉ*:･ﾟ✧");
          var storyImage = document.querySelector("#story-image");
          var placeholder = document.getElementById("placeholder-text");
          storyImage.src = "dumbestbeing.webp";
          storyImage.style.opacity = "1";
          if (placeholder) placeholder.style.display = "none";
          if (window.innerWidth <= 900) {
            document
              .querySelector(".column-right")
              .classList.remove("mobile-hidden");
            setTimeout(function () {
              document
                .getElementById("story")
                .scrollIntoView({ behavior: "smooth", block: "start" });
            }, 10);
          }
        });
    </script>
  </body>
</html>
